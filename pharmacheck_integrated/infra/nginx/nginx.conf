# ══════════════════════════════════════════════════════════════════════════════
# NGINX API Gateway — PharmaCheck (Phase 5)
# Handles: TLS termination, rate limiting, CSP, JWT forwarding, SPA serving
# ══════════════════════════════════════════════════════════════════════════════

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"referrer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"request_id":"$request_id",'
        '"upstream_time":"$upstream_response_time"}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # ── Request ID ────────────────────────────────────────────────────────────
    add_header X-Request-ID $request_id always;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api_global:10m    rate=60r/m;
    limit_req_zone  $binary_remote_addr zone=api_auth:10m      rate=10r/m;
    limit_req_zone  $binary_remote_addr zone=api_check:10m     rate=20r/m;
    limit_req_status 429;

    # ── Upstream ──────────────────────────────────────────────────────────────
    upstream pharmacheck_api {
        server api:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS Server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS — replace with real certs in production (Let's Encrypt)
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS (2 years, includes subdomains, preload)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Frame-Options           "DENY"              always;
        add_header X-Content-Type-Options    "nosniff"           always;
        add_header X-XSS-Protection          "1; mode=block"     always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; "
            "script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; "
            "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; "
            "font-src 'self' https://fonts.gstatic.com; "
            "img-src 'self' data: blob:; "
            "connect-src 'self' https://generativelanguage.googleapis.com https://api.groq.com https://api.openai.com; "
            "frame-ancestors 'none';"
            always;

        # ── Client limits ──────────────────────────────────────────────────────
        client_max_body_size 15M;
        client_body_timeout  60s;
        client_header_timeout 20s;

        # ── Auth endpoints (strict rate limit) ────────────────────────────────
        location ~ ^/auth/(login|register) {
            limit_req zone=api_auth burst=5 nodelay;
            proxy_pass          http://pharmacheck_api;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    X-Request-ID      $request_id;
        }

        # ── Compliance check endpoints ────────────────────────────────────────
        location ~ ^/api/(check|stream) {
            limit_req zone=api_check burst=10 nodelay;
            proxy_pass          http://pharmacheck_api;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    X-Request-ID      $request_id;
            # SSE support
            proxy_set_header    Connection        "";
            proxy_http_version  1.1;
            proxy_buffering     off;
            proxy_read_timeout  180s;
        }

        # ── API (general) ─────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_global burst=20 nodelay;
            proxy_pass          http://pharmacheck_api;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    X-Request-ID      $request_id;
            proxy_read_timeout  120s;
        }

        # ── Legacy check_compliance ───────────────────────────────────────────
        location /check_compliance {
            limit_req zone=api_check burst=5 nodelay;
            proxy_pass          http://pharmacheck_api;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout  180s;
        }

        # ── Health check (no rate limit) ──────────────────────────────────────
        location /health {
            proxy_pass http://pharmacheck_api;
            access_log off;
        }

        # ── Metrics (internal only — block external) ──────────────────────────
        location /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny  all;
            proxy_pass http://pharmacheck_api;
        }

        # ── React SPA static files ────────────────────────────────────────────
        location /assets/ {
            root   /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            root   /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }
}
