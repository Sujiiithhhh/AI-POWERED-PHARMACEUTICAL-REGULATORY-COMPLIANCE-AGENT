# ══════════════════════════════════════════════════════════════════════════════
# Prometheus Scrape Configuration — PharmaCheck (Phase 5)
# Scrape interval: 15s (global)
# ══════════════════════════════════════════════════════════════════════════════

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    environment: production
    project:     pharmacheck

# ── Alerting rules files ──────────────────────────────────────────────────────
rule_files:
  - "alerts/*.yml"

# ── Alertmanager (configure to send emails/Slack on firing alerts) ────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# ── Scrape configs ────────────────────────────────────────────────────────────
scrape_configs:

  # PharmaCheck API
  - job_name: pharmacheck_api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8000']
        labels:
          service: api

  # Celery workers (via flower or prometheus exporter)
  - job_name: celery_workers
    static_configs:
      - targets: ['celery-worker:5555']
        labels:
          service: celery

  # Redis
  - job_name: redis
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: redis

  # PostgreSQL (requires postgres_exporter)
  - job_name: postgres
    static_configs:
      - targets: ['db:5432']
        labels:
          service: postgres

  # NGINX (requires nginx prometheus exporter or stub_status)
  - job_name: nginx
    static_configs:
      - targets: ['nginx:9113']
        labels:
          service: nginx

  # OpenTelemetry Collector self-monitoring
  - job_name: otel_collector
    static_configs:
      - targets: ['otel-collector:8888']
        labels:
          service: otel_collector

  # MinIO
  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['minio:9000']
        labels:
          service: minio

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
