version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
# PharmaCheck — Full Infrastructure Stack (Phase 5)
# Start:  docker compose up -d
# Stop:   docker compose down
# Logs:   docker compose logs -f api
# ══════════════════════════════════════════════════════════════════════════════

x-app-env: &app-env
  DATABASE_URL:   postgresql+asyncpg://pharma_user:changeme_in_prod@db:5432/pharmacheck
  REDIS_URL:      redis://redis:6379/0
  S3_ENDPOINT_URL: http://minio:9000
  S3_ACCESS_KEY:  minioadmin
  S3_SECRET_KEY:  minioadmin123
  S3_BUCKET:      pharmacheck-docs
  CLAMAV_HOST:    clamav
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_SERVICE_NAME: pharmacheck-api
  APP_ENV:        production

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       pharmacheck
      POSTGRES_USER:     pharma_user
      POSTGRES_PASSWORD: changeme_in_prod
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharma_user -d pharmacheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker + result backend + rate-limit cache) ─────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass changeme_redis --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "changeme_redis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ──────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"   # MinIO console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── ClamAV Antivirus ───────────────────────────────────────────────────────
  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    ports:
      - "3310:3310"
    volumes:
      - clamavdata:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdscan", "--ping"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s   # ClamAV takes time to update definitions

  # ── PharmaCheck API ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *app-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - model_cache:/app/outputs/ml_model
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Celery Worker (compliance + document tasks) ───────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: celery -A backend.celery_app worker --loglevel=info --concurrency=4 -Q compliance,documents,default
    env_file: .env
    environment:
      <<: *app-env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - model_cache:/app/outputs/ml_model

  # ── Celery Beat Scheduler (alert polling) ─────────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: celery -A backend.celery_app beat --loglevel=info -Q alerts
    env_file: .env
    environment:
      <<: *app-env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - celerybeat:/var/run/celerybeat

  # ── NGINX API Gateway ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend-react/dist:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: changeme_grafana
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/compliance.json
    volumes:
      - grafanadata:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus

  # ── OpenTelemetry Collector ───────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP
      - "8888:8888"   # Prometheus metrics (self-monitoring)
    volumes:
      - ./infra/otel/config.yaml:/etc/otel/config.yaml:ro

volumes:
  pgdata:
  redisdata:
  miniodata:
  clamavdata:
  prometheusdata:
  grafanadata:
  model_cache:
  celerybeat:
